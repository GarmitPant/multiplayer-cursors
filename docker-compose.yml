services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  app1:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379
      - REPLICA_ID=app1
    depends_on: [redis]

  app2:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379
      - REPLICA_ID=app2
    depends_on: [redis]

  lb:
    image: nginx:alpine
    ports: ["8080:80"]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./client:/usr/share/nginx/html:ro
    depends_on: [app1, app2]
