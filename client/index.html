<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Cursor Demo (placeholder)</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #fafafa; }
    .cursor { position: absolute; transform: translate(-2px, -2px); pointer-events: none;
              transition: left .05s linear, top .05s linear; display: flex; align-items: center; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .name { font-size: 11px; margin-left: 6px; color: #333; }
    #hud { position: fixed; top: 8px; left: 8px; font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <div id="hud"></div>
  <!--
    PLACEHOLDER UI. Cursor capture + rendering is the LLD innovation area.
    This exists only to prove the backend slice end-to-end. Replace entirely in the LLD phase.
  -->
  <script>
    const room = location.hash.slice(1) || "demo";
    const name = new URLSearchParams(location.search).get("name")
                 || "anon-" + Math.random().toString(36).slice(2, 6);
    const WS_URL = (location.protocol === "https:" ? "wss://" : "ws://")
                 + location.host + "/ws/" + room + "?name=" + encodeURIComponent(name);

    const hud = document.getElementById("hud");
    hud.textContent = `room: ${room} | name: ${name}`;

    let me = null;
    const peers = {}; // user_id -> { el }

    function ensurePeer(uid, color, nm) {
      if (peers[uid]) return peers[uid];
      const el = document.createElement("div");
      el.className = "cursor";
      el.innerHTML = `<span class="dot" style="background:${color || '#333'}"></span>`
                   + `<span class="name">${nm || ''}</span>`;
      document.body.appendChild(el);
      return (peers[uid] = { el });
    }
    function movePeer(uid, x, y) {
      const p = peers[uid]; if (!p) return;
      p.el.style.left = (x * innerWidth) + "px";
      p.el.style.top = (y * innerHeight) + "px";
    }
    function dropPeer(uid) { if (peers[uid]) { peers[uid].el.remove(); delete peers[uid]; } }

    const ws = new WebSocket(WS_URL);
    ws.onmessage = (e) => {
      const m = JSON.parse(e.data);
      if (m.type === "init") {
        me = m.self.user_id;
        hud.textContent += ` | served by: ${m.replica}`;
        (m.peers || []).forEach(p => ensurePeer(p.user_id, p.color, p.name));
      } else if (m.type === "peer_joined") {
        if (m.user_id !== me) ensurePeer(m.user_id, m.color, m.name);
      } else if (m.type === "peer_left") {
        dropPeer(m.user_id);
      } else if (m.type === "cursor" || m.type === "cursors") {
        // slice relays single "cursor"; LLD will send batched "cursors" frames
        const ups = m.updates || [m];
        ups.forEach(u => {
          if (u.user_id && u.user_id !== me) { ensurePeer(u.user_id); movePeer(u.user_id, u.x, u.y); }
        });
      }
      // "draw" intentionally not rendered here — trail UX is LLD.
    };

    // crude 20Hz throttle — placeholder only; capture strategy is the LLD innovation area
    let last = 0;
    addEventListener("mousemove", (ev) => {
      const now = performance.now();
      if (now - last < 50) return;
      last = now;
      if (ws.readyState === 1) {
        ws.send(JSON.stringify({ type: "cursor", x: ev.clientX / innerWidth, y: ev.clientY / innerHeight }));
      }
    });
  </script>
</body>
</html>
